<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Datalens Venus Visualizations</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <style>
    :root {
      --datalens-accent: #bcbddc;
      --datalens-accent-soft: #efeff8;
      --datalens-accent-deep: #5b5d8e;
    }

    body {
      background: #f8f8fb;
    }

    .navbar {
      background: var(--datalens-accent-soft);
      border-color: var(--datalens-accent);
    }

    .navbar-brand {
      color: var(--datalens-accent-deep);
      font-weight: 700;
    }

    .navbar-brand:hover,
    .navbar-brand:focus,
    .nav-link:hover,
    .nav-link:focus {
      color: var(--datalens-accent-deep);
    }

    .venus-panel {
      min-height: 420px;
      border-color: var(--datalens-accent);
      box-shadow: 0 0.25rem 1rem rgba(91, 93, 142, 0.08);
    }

    .venus-panel h2 {
      color: var(--datalens-accent-deep);
      border-bottom: 3px solid var(--datalens-accent);
      padding-bottom: 0.5rem;
    }

    .venus-container {
      display: block;
      width: 100%;
      height: 360px;
    }
  </style>
  <script type="module" src="./index.js"></script>
</head>
<body>
  <nav class="navbar navbar-expand-lg border-bottom">
    <div class="container">
      <a class="navbar-brand" href="#">Datalens</a>
      <button
        class="navbar-toggler"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#mainNavbar"
        aria-controls="mainNavbar"
        aria-expanded="false"
        aria-label="Toggle navigation"
      >
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainNavbar">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link" href="#" aria-label="GitHub repository">GitHub</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container py-4">
    <div class="row g-4">
      <section class="col-12 col-lg-6">
        <div class="venus-panel bg-white border rounded-2 p-3">
          <h2 class="h5 mb-3">CQ1</h2>
          <venus-graph width="100%" class="venus-container" id="cq1-venus"></venus-graph>
        </div>
      </section>

      <section class="col-12 col-lg-6">
        <div class="venus-panel bg-white border rounded-2 p-3">
          <h2 class="h5 mb-3">CQ2</h2>
          <venus-graph width="100%" class="venus-container" id="cq2-venus"></venus-graph>
        </div>
      </section>

      <section class="col-12 col-lg-6">
        <div class="venus-panel bg-white border rounded-2 p-3">
          <h2 class="h5 mb-3">CQ3</h2>
          <venus-graph width="100%" class="venus-container" id="cq3-venus"></venus-graph>
        </div>
      </section>

      <section class="col-12 col-lg-6">
        <div class="venus-panel bg-white border rounded-2 p-3">
          <h2 class="h5 mb-3">CQ4</h2>
          <venus-scatterplot width="100%" class="venus-container" id="cq4-venus"></venus-scatterplot>
        </div>
      </section>
    </div>
  </main>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"
  ></script>
  <script type="module" src="./cq1.js"></script>
  <script type="module" src="./cq2.js"></script>
  <script type="module" src="./cq3.js"></script>
  <script type="module" src="./cq4.js"></script>
  
</body>
</html>
