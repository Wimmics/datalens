version: "3.8"

services:
  virtuoso:
    image: openlink/virtuoso-opensource-7
    container_name: virtuoso-datalens
    platform: linux/amd64
    ports:
      - "8890:8890"   # SPARQL endpoint and web UI
      - "1111:1111"   # isql port
    volumes:
      - ./virtuoso.ini:/opt/virtuoso-opensource/virtuoso.ini
      - ./virtuoso-data:/data                # Your RDF TTL files here
    environment:
      VIRT_SPARQL_UPDATE: "true"
      DBA_PASSWORD: "dba"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8890/sparql"]
      interval: 10s
      timeout: 5s
      retries: 5
