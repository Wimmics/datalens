<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Datalens Venus Visualizations</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    rel="stylesheet"
  />
  <link href="./css/style.css" rel="stylesheet" />

  <script type="module" src="./js/index.js"></script>
</head>
<body>
  <nav class="navbar navbar-expand-lg fixed-top border-bottom">
    <div class="container-fluid px-4">
      <a class="navbar-brand" href="#">Datalens</a>
      <button
        class="navbar-toggler"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#mainNavbar"
        aria-controls="mainNavbar"
        aria-expanded="false"
        aria-label="Toggle navigation"
      >
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainNavbar">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link" href="#" aria-label="GitHub repository">GitHub</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container-fluid dashboard-container py-4">
    <div class="row g-4">
      <section class="col-12 col-lg-6">
        <div class="venus-panel bg-white border rounded-2 p-3">
          <div class="d-flex align-items-center justify-content-between gap-3 mb-3">
            <h2 class="h5 mb-0">CQ1</h2>
            <button
              class="btn btn-sm btn-outline-secondary query-button"
              type="button"
              data-query-target="cq1-venus"
              data-query-title="CQ1 SPARQL Query"
              data-bs-toggle="modal"
              data-bs-target="#sparqlQueryModal"
              aria-label="Show CQ1 SPARQL query"
            >
              <i class="bi bi-code-slash" aria-hidden="true"></i>
            </button>
          </div>
          <venus-graph width="100%" class="venus-container" id="cq1-venus"></venus-graph>
        </div>
      </section>

      <section class="col-12 col-lg-6">
        <div class="venus-panel bg-white border rounded-2 p-3">
          <div class="d-flex align-items-center justify-content-between gap-3 mb-3">
            <h2 class="h5 mb-0">CQ2</h2>
            <button
              class="btn btn-sm btn-outline-secondary query-button"
              type="button"
              data-query-target="cq2-venus"
              data-query-title="CQ2 SPARQL Query"
              data-bs-toggle="modal"
              data-bs-target="#sparqlQueryModal"
              aria-label="Show CQ2 SPARQL query"
            >
              <i class="bi bi-code-slash" aria-hidden="true"></i>
            </button>
          </div>
          <venus-graph width="100%" class="venus-container" id="cq2-venus"></venus-graph>
        </div>
      </section>

      <section class="col-12 col-lg-6">
        <div class="venus-panel bg-white border rounded-2 p-3">
          <div class="d-flex align-items-center justify-content-between gap-3 mb-3">
            <h2 class="h5 mb-0">CQ3</h2>
            <button
              class="btn btn-sm btn-outline-secondary query-button"
              type="button"
              data-query-target="cq3-venus"
              data-query-title="CQ3 SPARQL Query"
              data-bs-toggle="modal"
              data-bs-target="#sparqlQueryModal"
              aria-label="Show CQ3 SPARQL query"
            >
              <i class="bi bi-code-slash" aria-hidden="true"></i>
            </button>
          </div>
          <venus-graph width="100%" class="venus-container" id="cq3-venus"></venus-graph>
        </div>
      </section>

      <section class="col-12 col-lg-6">
        <div class="venus-panel bg-white border rounded-2 p-3">
          <div class="d-flex align-items-center justify-content-between gap-3 mb-3">
            <h2 class="h5 mb-0">CQ4</h2>
            <button
              class="btn btn-sm btn-outline-secondary query-button"
              type="button"
              data-query-target="cq4-venus"
              data-query-title="CQ4 SPARQL Query"
              data-bs-toggle="modal"
              data-bs-target="#sparqlQueryModal"
              aria-label="Show CQ4 SPARQL query"
            >
              <i class="bi bi-code-slash" aria-hidden="true"></i>
            </button>
          </div>
          <venus-scatterplot width="100%" class="venus-container" id="cq4-venus"></venus-scatterplot>
        </div>
      </section>
    </div>
  </main>

  <div
    class="modal fade"
    id="sparqlQueryModal"
    tabindex="-1"
    aria-labelledby="sparqlQueryModalLabel"
    aria-hidden="true"
  >
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header">
          <h2 class="modal-title fs-5" id="sparqlQueryModalLabel">SPARQL Query</h2>
          <button
            type="button"
            class="btn-close"
            data-bs-dismiss="modal"
            aria-label="Close"
          ></button>
        </div>
        <div class="modal-body">
          <pre class="query-modal-code bg-light border rounded-2 p-3"><code id="sparqlQueryCode"></code></pre>
        </div>
      </div>
    </div>
  </div>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"
  ></script>
  <script type="module" src="./js/cq1.js"></script>
  <script type="module" src="./js/cq2.js"></script>
  <script type="module" src="./js/cq3.js"></script>
  <script type="module" src="./js/cq4.js"></script>
  <script>
    const queryModal = document.querySelector("#sparqlQueryModal");
    const queryModalTitle = document.querySelector("#sparqlQueryModalLabel");
    const queryModalCode = document.querySelector("#sparqlQueryCode");

    queryModal.addEventListener("show.bs.modal", (event) => {
      const button = event.relatedTarget;
      const venusElement = document.querySelector(`#${button.dataset.queryTarget}`);

      queryModalTitle.textContent = button.dataset.queryTitle;
      queryModalCode.textContent = venusElement?.sparqlQuery?.trim() || "Query not available yet.";
    });
  </script>
  
</body>
</html>
